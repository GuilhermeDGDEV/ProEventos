<app-titulo [titulo]="'Eventos'"></app-titulo>

<div class="form-group mb-2 d-flex align-items-center filter-group">
  <label>Filtro: </label>
  <input
    type="text"
    class="form-control"
    placeholder="buscar"
    [(ngModel)]="filtroLista"
  />
</div>

<table class="table table-striped">
  <thead>
    <tr class="table-dark">
      <th>
        <button type="button" class="btn btn-outline-light btn-sm" (click)="changeImageView()">
          <i class="{{ imageShow ? 'fa fa-eye-slash' : 'fa fa-eye' }}"></i>
          {{ imageShow ? "ocultar" : "exibir" }}
        </button>
      </th>
      <th>#</th>
      <th>Tema</th>
      <th>Local</th>
      <th>Data</th>
      <th>Qtd Pessoas</th>
      <th>Lote</th>
      <th>Opções</th>
    </tr>
  </thead>
  <tbody *ngIf="eventos.length; else nenhumEvento">
    <tr *ngFor="let evento of eventosFiltrados">
      <td>
        <img
          [collapse]="!imageShow"
          [isAnimated]="true"
          src="assets/{{ evento.imagemURL }}"
          alt="{{ evento.imagemURL }}"
          [style.width.px]="imageWidth"
          [style.margin.px]="imageMargin"
        />
      </td>
      <td>{{ evento.id }}</td>
      <td>{{ evento.tema }}</td>
      <td>{{ evento.local }}</td>
      <td>{{ evento.dataEvento | DateTimeFormatPipe }}</td>
      <td>{{ evento.qtdPessoas }}</td>
      <td>{{ evento.lotes[0].nome }}</td>
      <td>
        <button type="button" class="btn btn-primary btn-sm me-2" tooltip="Editar">
          <i class="fa fa-edit"></i>
        </button>
        <button type="button" class="btn btn-danger btn-sm" tooltip="Excluir" (click)="openModal(template)">
          <i class="fa fa-trash"></i>
        </button>
      </td>
    </tr>
  </tbody>
  <ng-template #nenhumEvento>
    <tfoot>
      <tr>
        <td colspan="8" class="text-center">
          <h4>Nenhum evento encontrado!</h4>
        </td>
      </tr>
    </tfoot>
  </ng-template>
</table>

<ng-template #template>
  <div class="modal-body text-center">
    <p>Tem certeza que quer deletar o evento?</p>
    <button type="button" class="btn btn-light me-2" (click)="confirm()">Sim</button>
    <button type="button" class="btn btn-primary" (click)="decline()">Não</button>
  </div>
</ng-template>
